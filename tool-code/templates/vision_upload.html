<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Understanding Upload</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            min-height: 100vh;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #1a202c;
            padding: 28px;
        }
        .page { max-width: 1040px; margin: 0 auto; }
        .card {
            background: rgba(255, 255, 255, 0.98);
            border-radius: 18px;
            padding: 28px;
            box-shadow: 0 24px 50px rgba(0, 0, 0, 0.22);
        }
        h1 { font-size: 26px; margin-bottom: 8px; }
        .muted { color: #6b7280; font-size: 14px; line-height: 1.5; }
        .upload-actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin: 22px 0;
        }
        button, .button {
            border: 0;
            border-radius: 10px;
            padding: 13px 18px;
            background: #3658d4;
            color: white;
            font-weight: 800;
            cursor: pointer;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            min-height: 44px;
        }
        .secondary {
            background: white;
            color: #475569;
            border: 1px solid #cbd5e1;
        }
        .danger {
            background: #fff5f5;
            color: #9b2c2c;
            border: 1px solid #fecaca;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 14px;
            margin-top: 18px;
        }
        .thumb {
            border: 1px solid #dbe3ef;
            border-radius: 10px;
            background: #f8fafc;
            padding: 8px;
            min-width: 0;
        }
        .thumb img {
            width: 100%;
            aspect-ratio: 1 / 1;
            object-fit: cover;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
            background: white;
        }
        .thumb-name {
            font-size: 12px;
            color: #475569;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin: 8px 0;
        }
        .thumb button {
            width: 100%;
            padding: 9px 10px;
            min-height: 36px;
            font-size: 13px;
        }
        .empty {
            border: 1px dashed #cbd5e1;
            background: #f8fafc;
            color: #64748b;
            border-radius: 12px;
            padding: 28px;
            text-align: center;
            margin-top: 18px;
        }
        .footer {
            display: flex;
            justify-content: flex-end;
            gap: 12px;
            margin-top: 24px;
            flex-wrap: wrap;
        }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <main class="page">
        <section class="card">
            <h1>Image Understanding</h1>
            <p class="muted">{{ model.name }}. Add one or more photos, review them here, then confirm to start image understanding.</p>

            <div class="upload-actions">
                <button type="button" onclick="document.getElementById('singleInput').click();">Add One Image</button>
                <button type="button" onclick="document.getElementById('multiInput').click();">Add Multiple Images</button>
            </div>

            <input id="singleInput" type="file" accept="image/*" capture="environment">
            <input id="multiInput" type="file" accept="image/*" multiple>

            <div id="emptyState" class="empty">No images selected yet.</div>
            <div id="previewGrid" class="grid"></div>

            <form id="uploadForm" action="/vision/start" method="post" enctype="multipart/form-data">
                <div class="footer">
                    <a class="button secondary" href="javascript:history.back()">Cancel</a>
                    <button type="submit" id="confirmButton" disabled>Confirm and Understand</button>
                </div>
            </form>
        </section>
    </main>

    <script>
        const selectedFiles = [];
        const previewGrid = document.getElementById('previewGrid');
        const emptyState = document.getElementById('emptyState');
        const uploadForm = document.getElementById('uploadForm');
        const confirmButton = document.getElementById('confirmButton');
        const dataTransfer = new DataTransfer();

        function addFiles(fileList) {
            Array.from(fileList).forEach(file => {
                if (!file.type.startsWith('image/')) return;
                selectedFiles.push(file);
            });
            renderPreviews();
        }

        function removeFile(index) {
            selectedFiles.splice(index, 1);
            renderPreviews();
        }

        function syncFormFiles() {
            dataTransfer.items.clear();
            selectedFiles.forEach(file => dataTransfer.items.add(file));
            let fileInput = document.getElementById('imagesForSubmit');
            if (!fileInput) {
                fileInput = document.createElement('input');
                fileInput.type = 'file';
                fileInput.id = 'imagesForSubmit';
                fileInput.name = 'images';
                fileInput.multiple = true;
                fileInput.style.display = 'none';
                uploadForm.prepend(fileInput);
            }
            fileInput.files = dataTransfer.files;
        }

        function renderPreviews() {
            previewGrid.innerHTML = '';
            emptyState.style.display = selectedFiles.length ? 'none' : '';
            confirmButton.disabled = selectedFiles.length === 0;
            selectedFiles.forEach((file, index) => {
                const card = document.createElement('div');
                card.className = 'thumb';
                const img = document.createElement('img');
                img.src = URL.createObjectURL(file);
                img.onload = () => URL.revokeObjectURL(img.src);
                const name = document.createElement('div');
                name.className = 'thumb-name';
                name.textContent = file.name;
                const remove = document.createElement('button');
                remove.type = 'button';
                remove.className = 'danger';
                remove.textContent = 'Remove';
                remove.onclick = () => removeFile(index);
                card.appendChild(img);
                card.appendChild(name);
                card.appendChild(remove);
                previewGrid.appendChild(card);
            });
            syncFormFiles();
        }

        document.getElementById('singleInput').addEventListener('change', event => {
            addFiles(event.target.files);
            event.target.value = '';
        });
        document.getElementById('multiInput').addEventListener('change', event => {
            addFiles(event.target.files);
            event.target.value = '';
        });
        uploadForm.addEventListener('submit', event => {
            syncFormFiles();
            if (selectedFiles.length === 0) {
                event.preventDefault();
            }
        });
    </script>
</body>
</html>
