<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Identification System</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            overflow-x: hidden;
        }

        /* Background animation decoration */
        .bg-decoration {
            position: fixed;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: 0;
        }

        .bg-decoration::before,
        .bg-decoration::after {
            content: '';
            position: absolute;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.1);
            animation: float 20s infinite ease-in-out;
        }

        .bg-decoration::before {
            width: 400px;
            height: 400px;
            top: -100px;
            right: -100px;
        }

        .bg-decoration::after {
            width: 300px;
            height: 300px;
            bottom: -50px;
            left: -50px;
            animation-delay: -10s;
        }

        @keyframes float {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(30px, -30px) scale(1.1); }
        }

        .container {
            position: relative;
            z-index: 1;
            text-align: center;
            padding: 40px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 60px 50px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
            max-width: 480px;
            animation: slideUp 0.6s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .icon {
            width: 100px;
            height: 100px;
            margin: 0 auto 30px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .icon svg {
            width: 50px;
            height: 50px;
            fill: white;
        }

        h1 {
            font-size: 32px;
            color: #1a202c;
            margin-bottom: 16px;
            font-weight: 700;
        }

        .subtitle {
            font-size: 16px;
            color: #718096;
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 30px;
        }

        .start-btn {
            width: 100%;
            padding: 18px 32px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
            position: relative;
            overflow: hidden;
        }

        .start-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.5);
        }

        .start-btn:active {
            transform: translateY(0);
        }

        .start-btn::after {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        .start-btn:active::after {
            width: 300px;
            height: 300px;
        }

        .flowchart-btn {
            width: 100%;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            color: #667eea;
            background: white;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .admin-btn {
            width: 100%;
            padding: 14px 32px;
            font-size: 16px;
            font-weight: 600;
            color: #2d3748;
            background: #f7fafc;
            border: 2px solid #e2e8f0;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            text-decoration: none;
        }

        .admin-btn:hover {
            border-color: #4a5568;
            background: #edf2f7;
            transform: translateY(-2px);
        }

        .model-info {
            font-size: 13px;
            color: #718096;
            background: #f7fafc;
            border-radius: 10px;
            padding: 10px 12px;
            margin-bottom: 20px;
        }

        .flowchart-btn:hover {
            border-color: #667eea;
            background: #f7fafc;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.15);
        }

        .flowchart-btn svg {
            width: 20px;
            height: 20px;
        }

        .features {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding-top: 30px;
            border-top: 1px solid #e2e8f0;
        }

        .feature {
            text-align: center;
        }

        .feature-number {
            font-size: 24px;
            font-weight: 700;
            color: #667eea;
        }

        .feature-label {
            font-size: 12px;
            color: #a0aec0;
            margin-top: 4px;
        }
    </style>
</head>
<body>
    <div class="bg-decoration"></div>
    <div class="container">
        <div class="card">
            <div class="icon">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                </svg>
            </div>
            <h1>Smart Product Identification</h1>
            <p class="subtitle">Quickly identify product models through simple question-and-answer interactions based on a decision tree algorithm</p>
            <div class="model-info">
                Active model:
                {% if model %}
                    <strong>{{ model.name }}</strong>
                {% else %}
                    <strong>No active model</strong>
                {% endif %}
            </div>

            <div class="button-group">
                <form action="/start" method="post" style="width: 100%;">
                    <button type="submit" class="start-btn">Start Identification</button>
                </form>
                <a href="/flowchart" class="flowchart-btn">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M9 11l3 3L22 4"/>
                        <path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
                    </svg>
                    View Decision Flowchart
                </a>
                <a href="/admin" class="admin-btn">Admin Configuration</a>
            </div>

            <!-- <div class="features">
                <div class="feature">
                    <div class="feature-number">AI</div>
                    <div class="feature-label">Smart Decision-Making</div>
                </div>
                <div class="feature">
                    <div class="feature-number">Fast</div>
                    <div class="feature-label">Fast Identification</div>
                </div>
                <div class="feature">
                    <div class="feature-number">Easy</div>
                    <div class="feature-label">Easy to Use</div>
                </div>
            </div> -->
        </div>
    </div>
</body>
</html>
